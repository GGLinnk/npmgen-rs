name: npmgen
description: Generate the npm publish tree (meta + per-platform packages) that ships a prebuilt Rust binary.
author: Gabriel GRONDIN

branding:
  icon: package
  color: orange

inputs:
  version:
    description: npmgen-cli version to install from crates.io. Empty installs the latest.
    required: false
    default: ""
  manifest-path:
    description: Path to the target crate's Cargo.toml.
    required: false
    default: ""
  out:
    description: Output root for the generated tree (default dist/npm).
    required: false
    default: ""
  package:
    description: Workspace members to publish, comma-separated or repeated.
    required: false
    default: ""
  workspace:
    description: Publish every workspace member. Set to "true" to enable.
    required: false
    default: ""
  exclude:
    description: Workspace members to drop from the selection, comma-separated.
    required: false
    default: ""
  bin:
    description: Binaries to publish, comma-separated.
    required: false
    default: ""
  pkg-version:
    description: Override the package version.
    required: false
    default: ""
  tag:
    description: Require the resolved version to equal v<tag>.
    required: false
    default: ""
  no-build:
    description: Assemble from existing binaries instead of building. Set to "true" to enable.
    required: false
    default: ""
  builder:
    description: Build driver, for example cargo, cross, or cargo-zigbuild.
    required: false
    default: ""
  target:
    description: Restrict to these target keys, comma-separated.
    required: false
    default: ""

outputs:
  out:
    description: Output root the tree was written to.
    value: ${{ steps.run.outputs.out }}

runs:
  using: composite
  steps:
    - name: Install npmgen-cli
      shell: bash
      env:
        IN_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if [ -n "$IN_VERSION" ]; then
          cargo install npmgen-cli --version "$IN_VERSION"
        else
          cargo install npmgen-cli
        fi
    - name: Run npmgen
      id: run
      shell: bash
      env:
        IN_MANIFEST_PATH: ${{ inputs.manifest-path }}
        IN_OUT: ${{ inputs.out }}
        IN_PACKAGE: ${{ inputs.package }}
        IN_WORKSPACE: ${{ inputs.workspace }}
        IN_EXCLUDE: ${{ inputs.exclude }}
        IN_BIN: ${{ inputs.bin }}
        IN_PKG_VERSION: ${{ inputs.pkg-version }}
        IN_TAG: ${{ inputs.tag }}
        IN_NO_BUILD: ${{ inputs.no-build }}
        IN_BUILDER: ${{ inputs.builder }}
        IN_TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail
        if [ -n "$IN_MANIFEST_PATH" ]; then export NPMGEN_MANIFEST_PATH="$IN_MANIFEST_PATH"; fi
        if [ -n "$IN_OUT" ]; then export NPMGEN_OUT="$IN_OUT"; fi
        if [ -n "$IN_PACKAGE" ]; then export NPMGEN_PACKAGE="$IN_PACKAGE"; fi
        if [ "$IN_WORKSPACE" = "true" ]; then export NPMGEN_WORKSPACE=true; fi
        if [ -n "$IN_EXCLUDE" ]; then export NPMGEN_EXCLUDE="$IN_EXCLUDE"; fi
        if [ -n "$IN_BIN" ]; then export NPMGEN_BIN="$IN_BIN"; fi
        if [ -n "$IN_PKG_VERSION" ]; then export NPMGEN_PKG_VERSION="$IN_PKG_VERSION"; fi
        if [ -n "$IN_TAG" ]; then export NPMGEN_TAG="$IN_TAG"; fi
        if [ "$IN_NO_BUILD" = "true" ]; then export NPMGEN_NO_BUILD=true; fi
        if [ -n "$IN_BUILDER" ]; then export NPMGEN_BUILDER="$IN_BUILDER"; fi
        if [ -n "$IN_TARGET" ]; then export NPMGEN_TARGETS="$IN_TARGET"; fi
        npmgen
        echo "out=${NPMGEN_OUT:-dist/npm}" >> "$GITHUB_OUTPUT"
