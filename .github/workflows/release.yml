# Release: on a v* tag, verify, publish to crates.io via OIDC Trusted
# Publishing (no stored tokens), and cut a GitHub Release.
#
# One-time setup:
#   - crates.io: enable Trusted Publishing for BOTH npmgen-core and npmgen-cli
#     (crate Settings -> Trusted Publishing), pointing at this repo + the
#     `release` workflow + the `release` environment.
#   - GitHub: create the `release` environment and add required reviewers, so a
#     human approves every publish.
#   - Marketplace: on the first release, accept the Marketplace agreement and
#     tick "Publish this Action to the GitHub Marketplace" in the UI; later
#     releases refresh the listing automatically.
#   - Hardening: replace each `uses:` tag below with a pinned commit SHA.

name: release

on:
  push:
    tags:
      - "v*"

# Default to no permissions; the publish job grants only what it needs.
permissions: {}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC for crates.io Trusted Publishing
    steps:
      - name: Check out the tag
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: Check the tag matches the crate version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "npmgen-cli") | .version')"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match crate version $version" >&2
            exit 1
          fi

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish npmgen-core
        run: cargo publish -p npmgen-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish npmgen-cli
        run: cargo publish -p npmgen-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create the GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
